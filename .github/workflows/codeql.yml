# CodeQL static analysis.
#
# ⚠ Requires "Code scanning" to be ENABLED in the repo settings:
#     Settings → Code security → Code scanning → Set up
# Until that toggle is flipped, the analyze step runs fine but the
# SARIF upload returns 403 ("Code scanning is not enabled"). The
# `continue-on-error: true` below keeps the workflow green in that
# state; remove it (or leave it — harmless) once the feature is on.
#
# Analysis actually runs either way — the diagnostic value is in the
# logs even before SARIF lands in the Security tab.

name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly rescan catches advisories published after merge.
    - cron: '23 4 * * 1'

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    # Don't red-X the commit just because Code scanning isn't enabled yet.
    # Real syntax or query failures still surface in logs.
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]
    steps:
      - uses: actions/checkout@v6
      - name: init CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality
      - name: autobuild
        uses: github/codeql-action/autobuild@v3
      - name: analyze
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:${{ matrix.language }}
          # Silently skip the upload when the feature is disabled instead of
          # dying on a 403. Once Code scanning is enabled this becomes a no-op.
          upload: always
