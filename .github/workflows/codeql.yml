# CodeQL static analysis.
#
# ⚠ Requires "Code scanning" to be ENABLED in repo settings:
#     Settings → Code security → Code scanning → Set up
# Until that toggle is flipped, analyze runs fine but the SARIF upload
# returns 403. The `continue-on-error: true` on the analyze STEP (not job)
# hides that specific failure from the check summary without suppressing
# real syntax or query errors that would surface in earlier steps.
#
# Once Code scanning is enabled you can remove the continue-on-error line;
# leaving it is harmless.

name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '23 4 * * 1' # Weekly rescan for fresh advisories

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]
    steps:
      - uses: actions/checkout@v6
      - name: init CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality
      - name: autobuild
        uses: github/codeql-action/autobuild@v3
      - name: analyze
        # Step-level continue-on-error so the SARIF 403 doesn't red-X the
        # check summary. Earlier steps (init, autobuild) still fail loudly.
        continue-on-error: true
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:${{ matrix.language }}
