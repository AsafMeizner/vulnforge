name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel in-flight runs for the same ref (e.g. rapid pushes) — keeps CI quick.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ── 1. Docs lint — fastest, runs first, blocks everything else ──
  docs-lint:
    name: docs-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # docs-lint diffs against base
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
      - name: docs-lint
        env:
          BASE_REF: ${{ github.base_ref && format('origin/{0}', github.base_ref) || 'origin/main' }}
        run: node scripts/docs-lint.mjs

  # ── 2. Typecheck in parallel with tests + build ──
  typecheck:
    name: typecheck (${{ matrix.target }})
    needs: docs-lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [server, frontend]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --ignore-scripts
      - name: typecheck ${{ matrix.target }}
        run: |
          if [ "${{ matrix.target }}" = "server" ]; then
            npx tsc --noEmit -p tsconfig.server.json
          else
            npx tsc --noEmit -p tsconfig.app.json
          fi

  # ── 3. Tests on three Node majors to catch version drift ──
  test:
    name: test (node ${{ matrix.node }})
    needs: docs-lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['20', '22']
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'
      - run: npm ci --ignore-scripts
      - name: vitest
        run: npm test
      - name: coverage (node 20 only)
        if: matrix.node == '20'
        run: npm run test:coverage -- --coverage.reporter=text --coverage.reporter=html --coverage.reporter=lcov
      - name: upload coverage
        if: matrix.node == '20'
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 7

  # ── 4. Build both artifacts on Linux + macOS + Windows ──
  build:
    name: build (${{ matrix.os }})
    needs: [typecheck, test]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --ignore-scripts
      - name: build frontend
        run: npm run build
      - name: build server
        run: npm run build:server

  # ── 5. Security audit (non-blocking warning for high/critical) ──
  audit:
    name: npm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --ignore-scripts
      - name: npm audit (prod deps only)
        # Fail the job only on critical vulns in PROD deps. Dev-dep noise stays informational.
        run: |
          set -o pipefail
          npm audit --omit=dev --audit-level=critical || EXIT=$?
          if [ "${EXIT:-0}" -ne 0 ]; then
            echo "::error::critical vulnerability in production dependencies"
            exit 1
          fi
      - name: npm audit summary (all deps, advisory)
        run: npm audit || true

  # ── 6. Docker server image build sanity check ──
  docker-build:
    name: docker image (server)
    needs: [typecheck, test]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
      - name: set up buildx
        uses: docker/setup-buildx-action@v4
      - name: docker build (no push)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.server
          push: false
          tags: vulnforge/server:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 7. All-green gate for branch protection ──
  ci-gate:
    name: ci-gate
    needs: [docs-lint, typecheck, test, build, audit, docker-build]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: assert all jobs succeeded
        run: |
          # This composite target lets branch protection require one check.
          if [ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" = "true" ]; then
            echo "::error::one or more required jobs failed"
            exit 1
          fi
          echo "all green"
