name: Release

# Triggered when a tag vX.Y.Z is pushed. Builds three artifacts -
# desktop installers (win/mac/linux), server Docker image, and bare
# server tarball - then attaches them to the GitHub Release.

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.2.0). Must already exist."
        required: true

permissions:
  contents: write # for creating/attaching releases
  packages: write # for pushing to GHCR

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ── 1. Desktop installers on three OSes ──
  desktop:
    name: desktop (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci --ignore-scripts
      - name: build desktop
        run: npm run build:desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.os }}
          path: |
            release/*.exe
            release/*.dmg
            release/*.AppImage
            release/*.deb
            release/*.zip
            release/latest*.yml
          if-no-files-found: warn
          retention-days: 14

  # ── 2. Server Docker image → GHCR ──
  docker:
    name: docker (server)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
      - name: compute tag + lowercase owner
        id: tag
        # GHCR (and the OCI distribution spec) reject uppercase in
        # repository names. `github.repository_owner` preserves the
        # user/org page casing (e.g. `AsafMeizner`), so we lowercase
        # it once here and reuse in every tag below.
        run: |
          VER="${{ github.event.inputs.tag || github.ref_name }}"
          echo "version=${VER#v}" >> $GITHUB_OUTPUT
          OWNER_LC="${GITHUB_REPOSITORY_OWNER,,}"
          echo "owner_lc=${OWNER_LC}" >> $GITHUB_OUTPUT
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - name: login GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: build + push multi-arch
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.server
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ steps.tag.outputs.owner_lc }}/vulnforge-server:${{ steps.tag.outputs.version }}
            ghcr.io/${{ steps.tag.outputs.owner_lc }}/vulnforge-server:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Disable SLSA provenance + SBOM attestations. The default
          # behaviour of docker/build-push-action@v7 is to auto-upload
          # a *.dockerbuild provenance artifact to the workflow run,
          # which actions/download-artifact@v4 cannot extract (blob
          # format mismatch) and fails the downstream release job with
          # "Artifact download failed after 5 retries". We'd need to
          # either turn these off or teach the release job to filter
          # them; turning them off is simpler for an alpha release.
          provenance: false
          sbom: false

  # ── 3. Bare-metal server tarball ──
  tarball:
    name: server tarball
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci --ignore-scripts
      - name: build tarball
        run: npm run build:server:tar
      - uses: actions/upload-artifact@v4
        with:
          name: server-tarball
          path: vulnforge-server-*.tar.gz
          if-no-files-found: error
          retention-days: 14

  # ── 4. Create the GitHub Release + attach all artifacts ──
  release:
    name: github release
    needs: [desktop, docker, tarball]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
          fetch-depth: 0
      # Only pull the artifacts the release actually consumes. Any
      # extra artifact produced as a side effect (e.g.
      # docker/build-push-action@v7's *.dockerbuild provenance blob,
      # which is disabled above but kept out of the download path as
      # defence-in-depth) is ignored. Two explicit steps are clearer
      # than a glob pattern here.
      - name: download desktop installers
        uses: actions/download-artifact@v4
        with:
          pattern: desktop-*
          path: artifacts/
      - name: download server tarball
        uses: actions/download-artifact@v4
        with:
          name: server-tarball
          path: artifacts/server-tarball/
      - name: flatten artifacts + compute checksums + lowercase owner
        id: meta
        run: |
          mkdir -p release-assets
          find artifacts -type f \( \
            -name '*.exe' -o -name '*.dmg' -o -name '*.AppImage' -o \
            -name '*.deb' -o -name '*.zip' -o -name '*.tar.gz' -o \
            -name 'latest*.yml' \
          \) -exec cp -v {} release-assets/ \;
          # SHA-256 over every binary so the release page has integrity.
          ( cd release-assets && sha256sum *.exe *.dmg *.AppImage *.deb *.zip *.tar.gz 2>/dev/null > SHA256SUMS.txt || true )
          ls -la release-assets/
          # Lowercase owner for the GHCR reference in the release body.
          OWNER_LC="${GITHUB_REPOSITORY_OWNER,,}"
          echo "owner_lc=${OWNER_LC}" >> $GITHUB_OUTPUT
      - name: create release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: ${{ github.event.inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: release-assets/*
          body: |
            ## Downloads

            - **Desktop installer** - pick the file that matches your OS below.
            - **Server Docker image:** `ghcr.io/${{ steps.meta.outputs.owner_lc }}/vulnforge-server:${{ github.event.inputs.tag || github.ref_name }}`
            - **Server tarball:** `vulnforge-server-*.tar.gz` - extract and run `sudo ./scripts/install-server.sh`.
            - **Checksums:** `SHA256SUMS.txt` (verify with `sha256sum -c SHA256SUMS.txt`).

            See [docs/](https://github.com/${{ github.repository }}/tree/main/docs) for install guides.
