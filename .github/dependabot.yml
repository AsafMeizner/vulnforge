version: 2

updates:
  # npm — group minor/patch updates into one PR/week to reduce noise
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    groups:
      frontend:
        patterns:
          - "react*"
          - "@vitejs/*"
          - "vite*"
        update-types:
          - "minor"
          - "patch"
      types:
        patterns:
          - "@types/*"
        update-types:
          - "minor"
          - "patch"
      dev-tooling:
        patterns:
          - "typescript"
          - "tsx"
          - "vitest"
          - "@vitest/*"
          - "electron"
          - "electron-builder"
        update-types:
          - "minor"
          - "patch"
    # Ignore major bumps for packages that need coordinated migrations.
    # Dependabot will still flag them via security advisories — these ignores
    # only suppress noisy drive-by majors.
    ignore:
      - dependency-name: "vitest"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@vitest/*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "electron"
        update-types: ["version-update:semver-major"]
      - dependency-name: "electron-builder"
        update-types: ["version-update:semver-major"]
      - dependency-name: "vite"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@vitejs/*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]
      - dependency-name: "express"
        update-types: ["version-update:semver-major"]
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
    labels:
      - "dependencies"
      - "automated"
    commit-message:
      prefix: "deps"
      include: "scope"

  # GitHub Actions — keep action versions current
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "UTC"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "ci"
      - "automated"
    commit-message:
      prefix: "ci(deps)"
    # upload-artifact@v7 has path-handling breaks that don't help us;
    # stay on v4. Majors for other actions still get PRs.
    ignore:
      - dependency-name: "actions/upload-artifact"
        update-types: ["version-update:semver-major"]

  # Docker — server image base + layer bumps
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "UTC"
    labels:
      - "dependencies"
      - "docker"
      - "automated"
    commit-message:
      prefix: "docker(deps)"
    # Stay on Node LTS — don't propose odd-numbered non-LTS majors.
    # When a new LTS ships (e.g. 22), manually bump the Dockerfile.
    ignore:
      - dependency-name: "node"
        update-types: ["version-update:semver-major"]
